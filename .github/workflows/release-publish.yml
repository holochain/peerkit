name: Publish Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is-release: ${{ steps.label.outputs.result }}
    steps:
      # A manual dispatch always publishes. For pushes, GitHub's commit->PR
      # association is eventually consistent and is often not indexed yet when
      # the push event fires on merge, so retry before giving up on a release.
      - name: Check for release label on merged PR
        id: label
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          result=false
          for attempt in $(seq 1 6); do
            if ! pulls=$(gh api "repos/$REPO/commits/$SHA/pulls"); then
              echo "PR lookup failed (attempt $attempt), retrying..." >&2
              sleep 10
              continue
            fi
            if [ "$(echo "$pulls" | jq 'length')" -eq 0 ]; then
              echo "No PR association yet (attempt $attempt), retrying..." >&2
              sleep 10
              continue
            fi
            if echo "$pulls" | jq -e 'any(.[].labels[].name; . == "release")' > /dev/null; then
              result=true
            fi
            break
          done
          echo "result=$result" >> "$GITHUB_OUTPUT"

  publish:
    needs: check
    if: needs.check.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
          token: ""

      - run: npm ci
      - run: npm run build:dist

      - name: Get version
        id: version
        run: echo "value=$(node -p "require('./packages/api/package.json').version")" >> $GITHUB_OUTPUT

      - name: Create and push tag
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "v$RELEASE_VERSION" | grep -q .; then
            echo "Tag v$RELEASE_VERSION already exists, skipping."
          else
            git tag "v$RELEASE_VERSION"
            git push origin "v$RELEASE_VERSION"
          fi

      - name: Publish to npm
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          if npm view "@peerkit/api@$RELEASE_VERSION" > /dev/null 2>&1; then
            echo "Version $RELEASE_VERSION already published, skipping."
          else
            if [[ "$RELEASE_VERSION" == *"-"* ]]; then
              npm publish --workspaces --access public --provenance --tag next
            else
              npm publish --workspaces --access public --provenance
            fi
          fi
